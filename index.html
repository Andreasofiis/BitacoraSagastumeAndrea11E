<style>
    html, body {
        height: 100%;
        margin: 0;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background-color: #f0f2dc;
    }

    body {
        display: flex;
        flex-direction: column;
        text-align: center;
    }

    header {
        padding: 30px;
        background-color: #0b788c;
        border-bottom: 2px solid #6f8790;
    }

    h1 {
        color: #ffffff;
        text-transform: uppercase;
        margin: 0;
        text-shadow:
            0 0 5px #dcefe9,
            0 0 10px #b8d9d5,
            0 0 20px #8db8b8;
    }

    main {
        flex: 1;
        padding: 40px 20px;
        max-width: 900px;
        margin: 0 auto;
        width: 100%;
        box-sizing: border-box;
    }

    .semana {
        background-color: #ffffff;
        color: #315b63;
        border-radius: 15px;
        padding: 25px;
        margin-bottom: 30px;
        text-align: left;
        border-left: 8px solid #86afb2;
        box-shadow: 0 4px 15px rgba(72, 121, 128, 0.25);
        transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .semana:hover {
        transform: translateY(-5px);
        box-shadow: 0 8px 25px rgba(72, 121, 128, 0.35);
    }

    .semana h3 {
        margin-top: 0;
        color: #0b788c;
    }

    .pdf-container {
        margin-top: 15px;
        border-radius: 10px;
        overflow: hidden;
        border: 1px solid #c9d8cf;
    }

    video {
        width: 100%;
        max-width: 100%;
        border-radius: 8px;
        margin-top: 10px;
    }

    footer {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 15px 50px;
        background-color: #a1ad7e;
        border-top: 3px solid #86afb2;
    }

    footer span {
        font-weight: bold;
        color: #ffffff;
    }

    footer img {
        transition: transform 0.3s ease;
        cursor: pointer;
    }

    footer img:hover {
        transform: scale(1.3);
    }
</style>
